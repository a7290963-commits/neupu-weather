<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牛埔水土保持戶外教室 — 氣象監測儀表板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "微軟正黑體", Arial, sans-serif; background: #f0f2f5; color: #222; }

  /* ─── Header ─── */
  header {
    background: linear-gradient(135deg, #1F497D 0%, #2E75B6 60%, #1B5E20 100%);
    color: #fff; padding: 20px 32px;
    display: flex; align-items: center; gap: 16px;
  }
  header h1 { font-size: 1.4rem; line-height: 1.3; }
  header p  { font-size: 0.82rem; opacity: 0.8; margin-top: 3px; }

  /* ─── Control Panel ─── */
  .ctrl-panel {
    background: #fff;
    border-bottom: 1px solid #dde3ea;
    padding: 14px 24px;
    display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
  }
  .ctrl-group { display: flex; flex-direction: column; gap: 5px; }
  .ctrl-group label { font-size: 0.75rem; font-weight: 700; color: #555; letter-spacing: .04em; }

  /* Mode tabs */
  .mode-tabs { display: flex; gap: 6px; }
  .mode-tab {
    padding: 6px 16px; border-radius: 20px; border: 1.5px solid #1976D2;
    font-size: 0.82rem; cursor: pointer; background: #fff; color: #1976D2;
    transition: all .15s;
  }
  .mode-tab.active { background: #1976D2; color: #fff; }
  .mode-tab:hover:not(.active) { background: #e3f0ff; }

  /* Date range */
  .date-row { display: flex; gap: 8px; align-items: center; }
  input[type=date] {
    padding: 5px 10px; border: 1.5px solid #ccd4de; border-radius: 6px;
    font-size: 0.82rem; color: #333; cursor: pointer;
  }
  input[type=date]:focus { outline: none; border-color: #1976D2; }
  .date-sep { color: #888; font-size: 0.82rem; }

  /* Quick range buttons */
  .quick-btns { display: flex; gap: 5px; flex-wrap: wrap; }
  .qbtn {
    padding: 4px 10px; border-radius: 12px;
    border: 1px solid #c0cbd8; font-size: 0.75rem;
    cursor: pointer; background: #f5f7fa; color: #445;
    transition: all .12s;
  }
  .qbtn:hover { background: #e3f0ff; border-color: #1976D2; color: #1976D2; }
  .qbtn.active { background: #1976D2; color: #fff; border-color: #1976D2; }

  /* Field checkboxes */
  .field-checks { display: flex; gap: 8px; flex-wrap: wrap; }
  .fcheck {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 12px;
    border: 1px solid #c0cbd8; font-size: 0.78rem;
    cursor: pointer; background: #f5f7fa; color: #445;
    transition: all .12s; user-select: none;
  }
  .fcheck input { display: none; }
  .fcheck.checked { background: #e8f5e9; border-color: #2E7D32; color: #1B5E20; }
  .fcheck .dot { width: 8px; height: 8px; border-radius: 50%; background: #aaa; }
  .fcheck.checked .dot { background: #2E7D32; }

  /* Station checkboxes */
  .station-checks { display: flex; gap: 8px; flex-wrap: wrap; }
  .scheck {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 12px; border-radius: 12px;
    border: 1.5px solid #ddd; font-size: 0.78rem;
    cursor: pointer; background: #f5f7fa;
    transition: all .12s; user-select: none;
  }
  .scheck input { display: none; }
  .scheck .sdot { width: 10px; height: 10px; border-radius: 50%; }

  /* Apply button */
  .apply-btn {
    padding: 7px 22px; background: #1976D2; color: #fff;
    border: none; border-radius: 8px; font-size: 0.85rem;
    font-weight: 700; cursor: pointer; transition: background .15s;
    align-self: flex-end;
  }
  .apply-btn:hover { background: #1557a0; }

  /* ─── Charts ─── */
  .container { max-width: 1400px; margin: 0 auto; padding: 20px 16px; }
  .charts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(600px, 1fr)); gap: 20px; }
  .chart-card {
    background: #fff; border-radius: 10px; padding: 18px 20px 14px;
    box-shadow: 0 1px 5px rgba(0,0,0,.09);
  }
  .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .chart-title { font-size: 0.92rem; font-weight: 700; color: #1F497D; }
  .chart-meta  { font-size: 0.72rem; color: #999; }
  .chart-body  { position: relative; height: 220px; }

  /* ─── Status / empty ─── */
  .status-bar {
    background: #E3F2FD; border-left: 4px solid #1976D2;
    padding: 10px 18px; margin: 0 0 16px; border-radius: 4px;
    font-size: 0.83rem; color: #1565C0;
  }
  .empty-state {
    text-align: center; padding: 60px 20px; color: #999; font-size: 0.9rem;
  }

  /* ─── Hypothesis banner ─── */
  .hypothesis {
    background: #E8F5E9; border-left: 5px solid #2E7D32;
    padding: 10px 18px; margin: 16px 0; border-radius: 4px;
    font-size: 0.85rem; color: #1B5E20;
  }

  /* ─── Footer ─── */
  footer { text-align: center; padding: 24px; color: #aaa; font-size: 0.78rem; }

  @media (max-width: 700px) {
    .charts-grid { grid-template-columns: 1fr; }
    header h1 { font-size: 1.1rem; }
    .ctrl-panel { padding: 12px 14px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>🌿 牛埔水土保持戶外教室 — 氣象監測儀表板</h1>
    <p>農塘微氣候效益監測 ｜ 資料期間：2021-06-01 ～ 2026-03-08 ｜ 5分鐘間隔（日均值顯示）</p>
  </div>
</header>

<div class="ctrl-panel" id="ctrlPanel">

  <!-- 模式切換 -->
  <div class="ctrl-group">
    <label>📊 圖表模式</label>
    <div class="mode-tabs">
      <button class="mode-tab active" onclick="setMode('weekly')" id="tab-weekly">本週週報</button>
      <button class="mode-tab" onclick="setMode('longterm')" id="tab-longterm">長期月均趨勢</button>
      <button class="mode-tab" onclick="setMode('3station')" id="tab-3station">三站同期比較</button>
      <button class="mode-tab" onclick="setMode('custom')" id="tab-custom">自訂時間區間</button>
    </div>
  </div>

  <!-- 自訂時間區間（custom 模式才顯示）-->
  <div class="ctrl-group" id="dateRangeGroup" style="display:none">
    <label>📅 時間區間</label>
    <div class="date-row">
      <input type="date" id="dateFrom" value="2025-01-01">
      <span class="date-sep">～</span>
      <input type="date" id="dateTo" value="2026-03-02">
    </div>
    <div class="quick-btns" style="margin-top:5px">
      <button class="qbtn" onclick="setQuick(7)">最近7天</button>
      <button class="qbtn" onclick="setQuick(30)">最近30天</button>
      <button class="qbtn" onclick="setQuick(90)">最近3個月</button>
      <button class="qbtn" onclick="setQuick(180)">最近半年</button>
      <button class="qbtn" onclick="setQuick(365)">最近1年</button>
      <button class="qbtn" onclick="setQuick(-1)">全部資料</button>
    </div>
  </div>

  <!-- 指標選擇 -->
  <div class="ctrl-group">
    <label>🌡 顯示指標</label>
    <div class="field-checks" id="fieldChecks">
      <label class="fcheck checked" data-field="temperature"><input type="checkbox" checked onchange="updateFieldCheck(this)"><div class="dot"></div>溫度</label>
      <label class="fcheck checked" data-field="rh"><input type="checkbox" checked onchange="updateFieldCheck(this)"><div class="dot"></div>相對溼度</label>
      <label class="fcheck checked" data-field="dew"><input type="checkbox" checked onchange="updateFieldCheck(this)"><div class="dot"></div>露點</label>
      <label class="fcheck checked" data-field="wind_speed"><input type="checkbox" checked onchange="updateFieldCheck(this)"><div class="dot"></div>風速</label>
      <label class="fcheck" data-field="solar"><input type="checkbox" onchange="updateFieldCheck(this)"><div class="dot"></div>日射量</label>
      <label class="fcheck" data-field="rain"><input type="checkbox" onchange="updateFieldCheck(this)"><div class="dot"></div>降雨量</label>
      <label class="fcheck" data-field="eto"><input type="checkbox" onchange="updateFieldCheck(this)"><div class="dot"></div>蒸發散量</label>
    </div>
  </div>

  <!-- 站點選擇 -->
  <div class="ctrl-group">
    <label>📍 顯示站點</label>
    <div class="station-checks" id="stationChecks">
      <label class="scheck" data-key="PondPlot" style="border-color:#1976D2;background:#e3f0ff">
        <input type="checkbox" checked onchange="updateStationCheck(this)">
        <div class="sdot" style="background:#1976D2"></div>夢幻湖畔
      </label>
      <label class="scheck" data-key="ChkPlot" style="border-color:#E53935;background:#fdecea">
        <input type="checkbox" checked onchange="updateStationCheck(this)">
        <div class="sdot" style="background:#E53935"></div>上游裸露區
      </label>
      <label class="scheck" data-key="Bareland" style="border-color:#F57C00;background:#fff3e0">
        <input type="checkbox" checked onchange="updateStationCheck(this)">
        <div class="sdot" style="background:#F57C00"></div>下游裸露區
      </label>
    </div>
  </div>

  <button class="apply-btn" onclick="applyFilters()">套用 ▶</button>
</div>

<div class="container">
  <div class="hypothesis">
    ⚗️ <strong>研究假說：</strong>農塘（夢幻湖）→ 調節微氣候（降溫 / 增濕）→ 促進植生覆蓋 → 達到水土保持目標
  </div>
  <div class="status-bar" id="statusBar">載入中…</div>
  <div class="charts-grid" id="chartsGrid"></div>
</div>

<footer>牛埔水土保持戶外教室 氣象監測系統 ｜ 互動儀表板</footer>

  solar:      { label:'日射量',     unit:'W/m²',  agg:'mean' },
  rain:       { label:'降雨量',     unit:'mm',    agg:'sum'  },
  eto:        { label:'蒸發散量ETo',unit:'mm/day',agg:'sum'  },
};

// ═══════════════════════════════════
//  狀態
// ═══════════════════════════════════
let currentMode    = 'weekly';
let activeFields   = new Set(['temperature','rh','dew','wind_speed']);
let activeStations = new Set(['PondPlot','ChkPlot','Bareland']);
let chartInstances = {};

// ═══════════════════════════════════
//  資料最新日（由資料自動推算）
// ═══════════════════════════════════
function latestDate(stationKey) {
  const d = DAILY[stationKey];
  if (!d) return null;
  const allDates = Object.values(d).flatMap(s => s.dates);
  return allDates.length ? allDates[allDates.length-1] : null;
}
const primaryLatest = latestDate('ChkPlot') || latestDate('PondPlot');
const globalLatest  = Object.keys(DAILY).map(latestDate).filter(Boolean).sort().pop();

// ═══════════════════════════════════
//  模式設定
// ═══════════════════════════════════
function setMode(mode) {
  currentMode = mode;
  ['weekly','longterm','3station','custom'].forEach(m => {
    document.getElementById('tab-'+m).classList.toggle('active', m === mode);
  });
  document.getElementById('dateRangeGroup').style.display = mode === 'custom' ? '' : 'none';

  // 預設日期
  if (mode === 'weekly' && primaryLatest) {
    const end   = new Date(primaryLatest);
    const start = new Date(end); start.setDate(start.getDate() - 7);
    document.getElementById('dateFrom').value = start.toISOString().slice(0,10);
    document.getElementById('dateTo').value   = end.toISOString().slice(0,10);
  } else if (mode === '3station') {
    document.getElementById('dateFrom').value = '2026-01-07';
    document.getElementById('dateTo').value   = globalLatest || '2026-03-08';
  } else if (mode === 'longterm') {
    document.getElementById('dateFrom').value = '2021-06-01';
    document.getElementById('dateTo').value   = globalLatest || '2026-03-08';
  }
  applyFilters();
}

function setQuick(days) {
  document.querySelectorAll('.qbtn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const end = new Date(globalLatest || new Date());
  if (days === -1) {
    document.getElementById('dateFrom').value = '2021-06-01';
  } else {
    const start = new Date(end); start.setDate(start.getDate() - days);
    document.getElementById('dateFrom').value = start.toISOString().slice(0,10);
  }
  document.getElementById('dateTo').value = end.toISOString().slice(0,10);
  applyFilters();
}

function updateFieldCheck(cb) {
  const label = cb.closest('.fcheck');
  const field = label.dataset.field;
  label.classList.toggle('checked', cb.checked);
  if (cb.checked) activeFields.add(field);
  else activeFields.delete(field);
}
function updateStationCheck(cb) {
  const label = cb.closest('.scheck');
  const key   = label.dataset.key;
  if (cb.checked) activeStations.add(key);
  else activeStations.delete(key);
}

// ═══════════════════════════════════
//  日期過濾工具
// ═══════════════════════════════════
function filterByDate(series, fromStr, toStr) {
  const from = fromStr ? new Date(fromStr) : null;
  const to   = toStr   ? new Date(toStr)   : null;
  const dates  = [];
  const values = [];
  series.dates.forEach((d, i) => {
    const dt = new Date(d);
    if (from && dt < from) return;
    if (to   && dt > to)   return;
    dates.push(d);
    values.push(series.values[i]);
  });
  return {dates, values};
}

// ═══════════════════════════════════
//  主繪圖
// ═══════════════════════════════════
function applyFilters() {
  const fromVal = document.getElementById('dateFrom').value;
  const toVal   = document.getElementById('dateTo').value;

  // 決定資料來源與聚合
  const isMonthly = currentMode === 'longterm';
  const src = isMonthly ? MONTHLY : DAILY;

  // 三站模式：只取三站都有資料的共同期間
  let clipFrom = fromVal, clipTo = toVal;
  if (currentMode === '3station') {
    const starts = Object.keys(DAILY).filter(k => activeStations.has(k) && DAILY[k])
      .map(k => Object.values(DAILY[k]).flatMap(s=>s.dates)[0]).filter(Boolean);
    const ends = Object.keys(DAILY).filter(k => activeStations.has(k) && DAILY[k])
      .map(k => {const s=Object.values(DAILY[k]).flatMap(x=>x.dates); return s[s.length-1];}).filter(Boolean);
    if (starts.length) clipFrom = starts.sort().pop();
    if (ends.length)   clipTo   = ends.sort()[0];
  }

  const grid = document.getElementById('chartsGrid');
  grid.innerHTML = '';
  let chartCount = 0;

  activeFields.forEach(field => {
    if (!FIELDS[field]) return;
    const meta = FIELDS[field];

    // 蒐集各站資料
    const datasets = [];
    let anyData = false;
    activeStations.forEach(key => {
      const stSrc = src[key];
      if (!stSrc || !stSrc[field]) return;
      const filtered = filterByDate(stSrc[field], clipFrom, clipTo);
      if (!filtered.dates.length) return;
      anyData = true;
      const st = STATIONS[key];
      datasets.push({
        label: st.label,
        data: filtered.dates.map((d,i) => ({x: d, y: filtered.values[i]})),
        borderColor: st.color,
        backgroundColor: st.color + '22',
        borderWidth: 1.6,
        pointRadius: isMonthly ? 4 : 0,
        tension: 0.3,
        fill: false,
        spanGaps: true,
      });
    });
    if (!anyData) return;

    // 建立卡片
    const card = document.createElement('div');
    card.className = 'chart-card';
    const chartId = 'chart_' + field + '_' + Date.now();
    card.innerHTML = `
      <div class="chart-header">
        <div class="chart-title">${meta.label}（${meta.unit}）</div>
        <div class="chart-meta">${isMonthly ? '月均值' : '日均值'} ｜ ${clipFrom} ～ ${clipTo}</div>
      </div>
      <div class="chart-body"><canvas id="${chartId}"></canvas></div>
    `;
    grid.appendChild(card);

    // 銷毀舊圖
    if (chartInstances[chartId]) {
      chartInstances[chartId].destroy();
    }

    const ctx = document.getElementById(chartId).getContext('2d');
    chartInstances[chartId] = new Chart(ctx, {
      type: 'line',
      data: { datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 20 } },
          tooltip: {
            callbacks: {
              label: c => `${c.dataset.label}: ${c.parsed.y !== null ? c.parsed.y.toFixed(2) : 'N/A'} ${meta.unit}`
            }
          },
          zoom: {
            zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x' },
            pan:  { enabled: true, mode: 'x' },
          },
        },
        scales: {
          x: {
            type: 'time',
            time: { unit: isMonthly ? 'month' : 'day', displayFormats: { day: 'MM/dd', month: 'yyyy/MM' } },
            ticks: { maxTicksLimit: 12, font: { size: 10 }, maxRotation: 30 },
            grid: { color: 'rgba(0,0,0,0.04)' },
          },
          y: {
            ticks: { font: { size: 10 } },
            grid: { color: 'rgba(0,0,0,0.07)' },
          },
        },
      },
    });
    chartCount++;
  });

  // 狀態列
  const modeLabel = { weekly:'本週週報', longterm:'長期月均', '3station':'三站同期', custom:'自訂區間' }[currentMode];
  document.getElementById('statusBar').textContent =
    `${modeLabel} ｜ ${clipFrom} ～ ${clipTo} ｜ 顯示 ${chartCount} 張圖表 ｜ 滾輪可縮放、拖曳平移`;

  if (chartCount === 0) {
    grid.innerHTML = '<div class="empty-state">⚠ 所選條件下無可顯示資料，請調整指標或站點選擇</div>';
  }
}

// ── 初始載入
document.addEventListener('DOMContentLoaded', () => {
  setMode('weekly');
});
</script>
</body>
</html>
